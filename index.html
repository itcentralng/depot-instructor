<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depot Nigerian Army — Instructors &amp; Staff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="bg-layer" aria-hidden="true">
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/images/nigerian_army_depot_pan_left_to_right_10s.mp4" type="video/mp4">
    </video>
    <div class="bg-overlay"></div>
  </div>


  <!-- Navbar -->
  <nav class="navbar">
    <img src="assets/images/logo.png" alt="Depot Logo" class="nav-logo" onerror="this.style.display='none'">
    <div class="brand">
      <span class="brand-main">NIGERIAN ARMY DEPOT</span>
      <span class="brand-sub">Osogbo · Instructors &amp; Staff</span>
    </div>
    <button class="back-btn hidden" id="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
      <span id="back-label">Back</span>
    </button>
    <button class="kiosk-close" onclick="window.close()" title="Close">
      <svg viewBox="0 0 24 24" fill="none"><path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
    </button>
  </nav>

  <!-- ══ SCREEN: HOME ══ -->
  <div class="screen active" id="screen-home">
    <div class="home-hero">
      <div class="home-hero-label">Depot Nigerian Army, Osogbo</div>
      <h1 class="home-hero-title">Instructors &amp; <em>Staff</em></h1>
    </div>
    <div class="home-cards">
      <button class="home-card" onclick="showInstructors()">
        <div class="home-card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="16" cy="14" r="7"/>
            <circle cx="32" cy="14" r="7"/>
            <path d="M2 40c0-7 6.268-12 14-12"/>
            <path d="M46 40c0-7-6.268-12-14-12"/>
            <path d="M16 28c0-7 16-7 16 0"/>
          </svg>
        </div>
        <div class="home-card-title">Instructors</div>
        <div class="home-card-sub">Tap to learn more</div>
        <div class="home-card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </button>

      <button class="home-card" onclick="showStaff()">
        <div class="home-card-icon">
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="6" width="15" height="15" rx="3"/>
            <rect x="27" y="6" width="15" height="15" rx="3"/>
            <rect x="6" y="27" width="15" height="15" rx="3"/>
            <rect x="27" y="27" width="15" height="15" rx="3"/>
          </svg>
        </div>
        <div class="home-card-title">Staff</div>
        <div class="home-card-sub">Tap to learn more</div>
        <div class="home-card-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </button>
    </div>
  </div>

  <!-- ══ SCREEN: INSTRUCTORS ══ -->
  <div class="screen" id="screen-instructors">
    <div class="sub-header">
      <span class="sub-header-label">Depot Nigerian Army</span>
      <div class="sub-header-sep"></div>
      <h2 class="sub-header-title">Instructors</h2>
      <span class="sub-header-count" id="instructors-count"></span>
    </div>
    <div class="sub-divider"></div>
    <div class="grid-wrap">
      <div class="officers-grid" id="instructors-grid"></div>
    </div>
  </div>

  <!-- ══ SCREEN: STAFF ══ -->
  <div class="screen" id="screen-staff">
    <div class="sub-header">
      <span class="sub-header-label">Depot Nigerian Army</span>
      <div class="sub-header-sep"></div>
      <h2 class="sub-header-title">Key <em>Staff</em></h2>
    </div>
    <div class="sub-divider"></div>
    <div class="staff-roles-wrap">
      <div class="staff-roles-grid" id="staff-roles-grid"></div>
    </div>
  </div>

  <!-- ══ SCREEN: ROLE DETAIL ══ -->
  <div class="screen" id="screen-role-detail">
    <div class="sub-header">
      <span class="sub-header-label" id="role-detail-short"></span>
      <div class="sub-header-sep"></div>
      <h2 class="sub-header-title" id="role-detail-title"></h2>
    </div>
    <div class="sub-divider"></div>
    <div class="role-detail-wrap">
      <div id="role-detail-body"></div>
    </div>
  </div>

  <!-- ══ PROFILE MODAL ══ -->
  <div class="modal-overlay hidden" id="modal" onclick="closeModal(event)">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-photo-frame">
        <img class="modal-photo" id="modal-photo" src="" alt="">
        <div class="modal-photo-silhouette hidden" id="modal-photo-sil">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8">
            <circle cx="12" cy="8" r="5"/><path d="M3 21c0-5 3.582-9 9-9s9 4 9 9"/>
          </svg>
        </div>
        <div class="modal-photo-shine" aria-hidden="true"></div>
      </div>
      <div class="modal-body">
        <div class="modal-role" id="modal-role"></div>
        <h2 class="modal-name" id="modal-name"></h2>
        <div class="modal-tenure hidden" id="modal-tenure"></div>
        <div class="modal-divider"></div>
        <div class="modal-bio-scroll">
          <p class="modal-bio" id="modal-bio"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    (function () {
      var v = document.querySelector('.bg-video');
      if (!v) return;
      v.muted = true;
      var tryPlay = function () { v.play().catch(function () {}); };
      tryPlay();
      document.addEventListener('click', tryPlay, { once: true });
    })();
  </script>
</body>
</html>
